# Caller workflow template — spec 5.740 Tier 2 (CI DETECTION).
#
# Drop this into each repo as `.github/workflows/secret-scan.yml`. It calls the fleet's ONE
# reusable secret-scan workflow at a PINNED SHA (fleet-pattern #17 — one SHA bump updates the
# whole tenant). The config travels with the reusable workflow, so this caller carries no rules.
#
# IMPORTANT: pin `@<sha>` to a real commit SHA of shared-resources (NOT a branch/tag) — a moving
# ref would let the gate's behaviour change under the repo without review. The rollout script
# fills the current SHA in automatically.
#
# Tenant note: 100eggs repos call THEIR tenant's copy of this reusable workflow (its own
# shared repo), not FunnelGuy/shared-resources. The rollout script templates the owner.

name: Secret scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    uses: FunnelGuy/shared-resources/.github/workflows/secret-scan.yml@REPLACE_WITH_SHA
    with:
      # The caller MUST pass the config source explicitly. github.workflow_ref inside a CALLED
      # reusable workflow resolves to the top-level CALLER's ref (not the reusable workflow's own),
      # so the "blank = derive" path checks out the caller repo and fails-closed on a missing
      # config. Passing repo+ref here is the only reliable, tenant-agnostic self-reference: it is
      # the SAME owner/repo@sha as the `uses:` line above (the rollout script keeps them in sync).
      config_repo: FunnelGuy/shared-resources
      config_ref: REPLACE_WITH_SHA
      # Optional: a repo with pre-existing accepted findings passes its baseline so the gate does
      # not wall off commits on day one (spec P5).
      # baseline_path: .gitleaks-baseline.json
