name: Secret scan (reusable)

# Fleet secret-detection Tier 2 (DETECTION, post-push) — spec 5.740.
#
# HONEST TIERING (fleet-pattern #38): this job runs on `push`, AFTER the commit is already on
# the remote (the fleet has no branch protection; pushes go direct to main). So it DETECTS and
# ALARMS on a secret that bypassed the local pre-commit hook — it does NOT prevent the push. The
# pre-commit hook (Tier 1) is the block; this + RM R1 are the detection backstop.
#
# ONE engine, ONE config, MANY callers (fleet-pattern #9/#17): the pinned gitleaks version and the
# shared .gitleaks.toml are VENDORED into this repo. A caller pins us at a SHA (uses: ...@<sha>),
# so the config travels WITH the workflow — no runtime curl of the config that could fail-OPEN.
#
# FAIL-CLOSED (challenger fix): the job asserts `test -f "$CONFIG"` BEFORE invoking gitleaks. The
# gitleaks Action silently falls back to its DEFAULT ruleset (and exits 0) if the custom config is
# missing — which would fail-OPEN to our custom Azure/high-entropy rule. The presence check makes
# fail-closed real: a missing/broken config ERRORS the job.

on:
  workflow_call:
    inputs:
      gitleaks_version:
        description: "Pinned gitleaks version (must match the vendored config's pin)"
        required: false
        type: string
        default: "8.30.1"
      # Callers with pre-existing accepted findings pass a baseline path (spec P5) so the gate
      # does not wall off commits on day one.
      baseline_path:
        description: "Optional path (in the CALLER repo) to a gitleaks baseline JSON"
        required: false
        type: string
        default: ""
      # The repo + ref that holds the vendored config. Defaults are tenant-AGNOSTIC: the caller
      # passes its own tenant's shared repo (align.me -> FunnelGuy/shared-resources; 100eggs ->
      # its own). Left blank, the workflow derives them from github.workflow_ref (the reusable
      # workflow's own repo@ref), so the config always matches the pinned workflow version.
      config_repo:
        description: "owner/repo holding shared-configs/gitleaks/.gitleaks.toml (blank = derive)"
        required: false
        type: string
        default: ""
      config_ref:
        description: "ref/SHA of config_repo to pin (blank = derive from workflow_ref)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # Check out the CALLER's repository (full history NOT needed — this is a HEAD/dir scan;
      # secrets-already-in-history are the Tier-4 one-off backfill's job, not this per-push gate).
      - name: Checkout caller repo
        uses: actions/checkout@v4

      # Derive the config repo@ref from github.workflow_ref when not passed explicitly.
      # workflow_ref looks like: OWNER/REPO/.github/workflows/secret-scan.yml@REF
      - name: Resolve config source repo + ref
        id: src
        env:
          IN_REPO: ${{ inputs.config_repo }}
          IN_REF: ${{ inputs.config_ref }}
          WF_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          REPO="$IN_REPO"; REF="$IN_REF"
          if [ -z "$REPO" ]; then REPO="${WF_REF%%/.github/*}"; fi
          if [ -z "$REF" ]; then REF="${WF_REF##*@}"; fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF"  >> "$GITHUB_OUTPUT"
          echo "Config source: $REPO @ $REF"

      # Check out the shared-config repo at that pinned ref to get the vendored .gitleaks.toml.
      # The config travels with the workflow version — no runtime curl of the config that could
      # fail-open. Tenant-agnostic: each tenant's caller resolves to its OWN shared repo.
      - name: Fetch vendored shared config
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.src.outputs.repo }}
          ref: ${{ steps.src.outputs.ref }}
          path: .secret-scan-shared

      - name: Locate + assert shared config (FAIL-CLOSED)
        id: cfg
        run: |
          set -euo pipefail
          CONFIG=""
          for cand in \
            ".secret-scan-shared/shared-configs/gitleaks/.gitleaks.toml" \
            "shared-configs/gitleaks/.gitleaks.toml"; do
            if [ -f "$cand" ]; then CONFIG="$cand"; break; fi
          done
          # FAIL-CLOSED: no config -> error the job. Never fall back to gitleaks' default ruleset
          # (the gitleaks Action would silently do that and exit 0 = fail-open on the Azure rule).
          if [ -z "$CONFIG" ] || [ ! -f "$CONFIG" ]; then
            echo "::error::Shared gitleaks config not found — failing closed (would otherwise scan with the default ruleset and miss the custom Azure rule)."
            exit 1
          fi
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "Using config: $CONFIG"

      - name: Install pinned gitleaks
        env:
          GL_VER: ${{ inputs.gitleaks_version }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (dir mode, HEAD)
        env:
          CONFIG: ${{ steps.cfg.outputs.config }}
          BASELINE: ${{ inputs.baseline_path }}
        run: |
          set -euo pipefail
          ARGS=(dir . --config "$CONFIG" --no-banner --redact --report-format sarif --report-path gitleaks.sarif)
          if [ -n "$BASELINE" ] && [ -f "$BASELINE" ]; then
            ARGS+=(--baseline-path "$BASELINE")
            echo "Using baseline: $BASELINE"
          fi
          # gitleaks exits non-zero when leaks are found -> the job FAILS (detection alarm). It
          # also exits non-zero on a config-load error, which is caught by the presence check above.
          gitleaks "${ARGS[@]}"

      - name: Upload SARIF (findings detail)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
